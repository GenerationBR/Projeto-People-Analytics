<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Funil Feminino — TIC Brasil</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head><body style="font-family:Inter,sans-serif;background:#f9f9f9;padding:20px">
<h1 style="color:#1E3A5F">Funil da Mulher na TIC — Brasil 2019–2022</h1>
<p style="color:#555">Fonte: base_campus_ti_brasil.csv — dataset simulado | Referência: INEP Censo da Educação Superior</p>
<div id="chart1"></div>
<script>
var anos = [2019, 2020, 2021, 2022];
var data = [
  {x: anos, y: [23.0, 18.6, 18.1, 21.7],  name: '% Matrículas',   mode:'lines+markers',
    line:{color:'#1E3A5F', width:3}, marker:{size:8}},
  {x: anos, y: [23.0, 18.6, 18.1, 21.7],  name: '% Ingressantes', mode:'lines+markers',
    line:{color:'#E91E8C', width:3, dash:'dot'}, marker:{size:8}},
  {x: anos, y: [25.4, 22.9, 14.1, 13.0], name: '% Concluintes',  mode:'lines+markers',
    line:{color:'#FF6B35', width:3, dash:'dash'}, marker:{size:8}},
];
var layout = {
  title:'Participação Feminina na TIC por Etapa do Funil (%)',
  xaxis:{title:'Ano', tickvals:[2019, 2020, 2021, 2022]},
  yaxis:{title:'% do total', range:[0,30]},
  plot_bgcolor:'white', paper_bgcolor:'#f9f9f9',
  legend:{orientation:'h', y:-0.2},
  annotations:[{
    x:2022, y:21.7, xref:'x', yref:'y',
    text:'<b>21.7% mat.</b>', showarrow:true, arrowhead:2,
    ax:30, ay:-30, font:{color:'#1E3A5F', size:13}
  }]
};
Plotly.newPlot('chart1', data, layout);
</script>
</body></html>
