<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Funil Feminino — TIC Brasil</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head><body style="font-family:Inter,sans-serif;background:#f9f9f9;padding:20px">
<h1 style="color:#1E3A5F">Funil da Mulher na TIC — Brasil 2019–2024</h1>
<p style="color:#555">Fonte: INEP Censo da Educação Superior | Dados: INEP/MEC</p>
<div id="chart1"></div>
<script>
var anos = [2019, 2020, 2021, 2022, 2023, 2024];
var data = [
  {x: anos, y: [13.5, 14.8, 16.3, 17.9, 18.7, 19.2],  name: '% Matrículas',   mode:'lines+markers',
    line:{color:'#1E3A5F', width:3}, marker:{size:8}},
  {x: anos, y: [14.6, 16.6, 19.0, 20.4, 20.6, 21.3],  name: '% Ingressantes', mode:'lines+markers',
    line:{color:'#E91E8C', width:3, dash:'dot'}, marker:{size:8}},
  {x: anos, y: [13.6, 14.0, 14.8, 15.3, 17.5, 19.2], name: '% Concluintes',  mode:'lines+markers',
    line:{color:'#FF6B35', width:3, dash:'dash'}, marker:{size:8}},
];
var layout = {
  title:'Participação Feminina na TIC por Etapa do Funil (%)',
  xaxis:{title:'Ano', tickvals:[2019, 2020, 2021, 2022, 2023, 2024]},
  yaxis:{title:'% do total', range:[0,30]},
  plot_bgcolor:'white', paper_bgcolor:'#f9f9f9',
  legend:{orientation:'h', y:-0.2},
  annotations:[{
    x:2024, y:19.2, xref:'x', yref:'y',
    text:'<b>19.2% mat.</b>', showarrow:true, arrowhead:2,
    ax:30, ay:-30, font:{color:'#1E3A5F', size:13}
  }]
};
Plotly.newPlot('chart1', data, layout);
</script>
</body></html>
